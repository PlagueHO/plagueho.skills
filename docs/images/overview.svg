<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <style>
    .card { opacity: 0; animation: cycle 45s infinite; }
    .card:nth-child(1) { animation-delay: 0s; }
    .card:nth-child(2) { animation-delay: 5s; }
    .card:nth-child(3) { animation-delay: 10s; }
    .card:nth-child(4) { animation-delay: 15s; }
    .card:nth-child(5) { animation-delay: 20s; }
    .card:nth-child(6) { animation-delay: 25s; }
    .card:nth-child(7) { animation-delay: 30s; }
    .card:nth-child(8) { animation-delay: 35s; }
    .card:nth-child(9) { animation-delay: 40s; }
    @keyframes cycle {
      0%    { opacity: 0; }
      1.5%  { opacity: 1; }
      11%   { opacity: 1; }
      12.5% { opacity: 0; }
      100%  { opacity: 0; }
    }
    .emoji   { font-size: 36px; }
    .title   { font: bold 22px 'Segoe UI',system-ui,sans-serif; fill: #58a6ff; }
    .desc    { font: 15px 'Segoe UI',system-ui,sans-serif; fill: #c9d1d9; }
    .count   { font: bold 14px 'Segoe UI',system-ui,sans-serif; fill: #8b949e; }
    .path    { font: 13px 'SFMono-Regular',Consolas,monospace; fill: #7ee787; }
    .border  { fill: none; stroke: #30363d; stroke-width: 1.5; rx: 12; }
    .pip     { fill: #30363d; }
    .pip-on  { fill: #58a6ff; }
  </style>

  <!-- Background -->
  <rect width="840" height="180" rx="12" fill="url(#bg)"/>
  <rect class="border" x="1" y="1" width="838" height="178"/>

  <g id="slides">
  <!-- Slide 1: Quickstart -->
  <g class="card">
    <text class="emoji" x="40" y="70">&#x1F680;</text>
    <text class="title" x="90" y="58">Quick Start</text>
    <text class="desc" x="90" y="82">Add to VS Code settings.json to install plugins via Copilot Chat:</text>
    <text class="path" x="90" y="108">"chat.plugins.marketplaces": ["PlagueHO/plagueho.skills"]</text>
    <text class="count" x="90" y="130">8 plugins &#x2022; 21 skills &#x2022; ready to install</text>
    <circle class="pip-on" cx="342" cy="160" r="4"/>
    <circle class="pip" cx="362" cy="160" r="4"/>
    <circle class="pip" cx="382" cy="160" r="4"/>
    <circle class="pip" cx="402" cy="160" r="4"/>
    <circle class="pip" cx="422" cy="160" r="4"/>
    <circle class="pip" cx="442" cy="160" r="4"/>
    <circle class="pip" cx="462" cy="160" r="4"/>
    <circle class="pip" cx="482" cy="160" r="4"/>
    <circle class="pip" cx="502" cy="160" r="4"/>
  </g>

