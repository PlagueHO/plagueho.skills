# Purpose Mapping
# Maps research purpose to enabled dimensions, research areas, and output sections.

deep-guide:
  description: "Comprehensive technical reference covering all aspects of the technology"
  audience: "Architects, senior engineers, technical decision-makers"
  dimensions:
    - overview
    - architecture
    - configuration
    - security
    - networking
    - monitoring
    - pricing
    - limits
    - integration
    - migration
    - sdks
    - samples
  areas:
    - docs
    - tech
    - blogs
    - arch
    - samples
    - solutions
    - other
  output_sections:
    - id: "01-overview"
      title: "Overview"
      description: "What it is, when to use it, positioning"
      primary_areas: [docs, blogs]
      secondary_areas: [other]
    - id: "02-architecture"
      title: "Architecture"
      description: "Components, data flow, deployment models"
      primary_areas: [arch, docs]
      secondary_areas: [tech]
    - id: "03-getting-started"
      title: "Getting Started"
      description: "Prerequisites, first deployment, quickstart"
      primary_areas: [docs, samples]
      secondary_areas: [solutions]
    - id: "04-configuration"
      title: "Configuration"
      description: "Detailed configuration reference"
      primary_areas: [docs, tech]
      secondary_areas: [samples]
    - id: "05-security"
      title: "Security"
      description: "Identity, networking, compliance"
      primary_areas: [docs, arch]
      secondary_areas: [tech]
    - id: "06-operations"
      title: "Operations"
      description: "Monitoring, scaling, troubleshooting"
      primary_areas: [docs, tech]
      secondary_areas: [blogs]
    - id: "07-integration"
      title: "Integration"
      description: "Related services, patterns"
      primary_areas: [arch, samples, solutions]
      secondary_areas: [docs]
    - id: "08-samples"
      title: "Code Samples"
      description: "Code examples across languages"
      primary_areas: [samples, solutions]
      secondary_areas: [docs, other]
    - id: "09-limitations"
      title: "Limitations"
      description: "Quotas, constraints, roadmap"
      primary_areas: [docs, tech]
      secondary_areas: [blogs, other]

