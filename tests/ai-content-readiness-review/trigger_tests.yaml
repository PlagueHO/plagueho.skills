# Generated from "WHEN:" trigger phrases in frontmatter
shouldTriggerPrompts:
  - "review this content for AI readiness"
  - "run an AI content audit on this document"
  - "check this document for AI best practices"
  - "do a content readiness review on my article"
  - "is this document AI-ready?"
  - "evaluate the content quality for AI consumption"
  - "review the structure and formatting for AI parsing"
  - "how well does this article follow AI content guidelines?"
  - "audit my documentation for AI optimization"
  - "assess this page for AI-friendly formatting"

