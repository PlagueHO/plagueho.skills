  - "set up Azure access for GitHub Actions"
  - "suggest GitHub Copilot skills for my project"
  - "convert a prompt file to a skill"
  - "update Azure Verified Modules in my Bicep files"
  - "fix a bug in my Python code"
  - "create a new agent skill"
  - "sync my VS Code profiles"
  - "modernize my .NET project file"
  - "scaffold a dotfiles repository"
