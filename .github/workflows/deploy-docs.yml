name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - website/**
      - plugins/**/plugin.json
      - plugins/**/SKILL.md
      - .github/plugin/marketplace.json
      - .github/workflows/build-docs.yml
      - .github/workflows/deploy-docs.yml

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Docs
    uses: ./.github/workflows/build-docs.yml
    permissions:
      contents: read

  deploy-docs:
    name: Deploy Docs
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
